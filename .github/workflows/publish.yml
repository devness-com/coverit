name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run build

      - run: chmod +x dist/cli/index.js

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

  sync-plugin:
    name: Sync Plugin Repo
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone plugin repo
        run: |
          git clone https://x-access-token:${{ secrets.PLUGIN_REPO_TOKEN }}@github.com/devness-com/coverit.git /tmp/plugin-repo

      - name: Sync plugin files
        run: |
          # Remove old files (preserve .git)
          find /tmp/plugin-repo -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

          # Copy fresh plugin files
          cp -r .claude-plugin /tmp/plugin-repo/
          cp -r plugins /tmp/plugin-repo/
          cp README.md /tmp/plugin-repo/
          cp LICENSE /tmp/plugin-repo/

      - name: Commit and push
        run: |
          cd /tmp/plugin-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          VERSION="${GITHUB_REF_NAME#v}"
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync plugin v$VERSION"
            git tag -a "v$VERSION" -m "Coverit v$VERSION"
            git push origin main --tags
            echo "Plugin repo synced to v$VERSION"
          fi
