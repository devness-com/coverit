name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Test
        run: bun run test --passWithNoTests || true

  sync-plugin:
    name: Sync Plugin Repo
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone plugin repo
        run: |
          git clone https://x-access-token:${{ secrets.PLUGIN_REPO_TOKEN }}@github.com/devness-com/coverit.git /tmp/plugin-repo

      - name: Sync plugin files
        run: |
          # Remove old files (preserve .git)
          find /tmp/plugin-repo -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

          # Copy fresh plugin files
          cp -r .claude-plugin /tmp/plugin-repo/
          cp -r plugins /tmp/plugin-repo/
          cp README.md /tmp/plugin-repo/
          cp LICENSE /tmp/plugin-repo/

      - name: Get source commit message
        id: get-msg
        run: echo "msg=$(git log -1 --pretty=format:'%s')" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          cd /tmp/plugin-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync: ${{ steps.get-msg.outputs.msg }}"
            git push origin main
            echo "Plugin repo synced"
          fi
